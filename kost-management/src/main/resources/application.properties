spring.application.name=kost-management

# --- KONEKSI DATABASE FLEKSIBEL ---
# Jika ada Variabel 'MYSQLHOST' (di Railway), pakai itu. Jika tidak ada, pakai 'localhost' (di Laptop).
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:kost_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Username & Password Fleksibel
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}

# Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- SETTINGAN LAIN ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Port Server (Railway biasanya mengatur port otomatis, tapi kita set default 8080)
server.port=${PORT:8080}