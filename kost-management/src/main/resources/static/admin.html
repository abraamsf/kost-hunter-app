<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="font-awesome-4.7.0/css/font-awesome.min.css">
    <style>
        .sidebar { height: 100vh; background: #343a40; color: white; position: fixed; width: 250px; padding-top: 20px; }
        .sidebar a { color: #ccc; padding: 15px 20px; display: block; text-decoration: none; }
        .sidebar a:hover, .sidebar a.active { background: #007bff; color: white; }
        .content { margin-left: 250px; padding: 20px; }
        .card-counter { padding: 20px; border-radius: 10px; color: white; margin-bottom: 20px; }
    </style>
</head>
<body class="bg-light">

<div class="sidebar">
    <h4 class="text-center mb-4">👑 Admin Panel</h4>
    <a href="#" class="active" onclick="switchTab('kost')"><i class="fa fa-home"></i> Data Kost</a>
    <a href="#" onclick="switchTab('booking')"><i class="fa fa-list"></i> Pesanan Masuk</a>
    <a href="#" onclick="logout()" class="text-danger mt-5"><i class="fa fa-sign-out"></i> Logout</a>
</div>

<div class="content">
    <div id="kostSection">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3>🏠 Kelola Data Kost</h3>
            <button class="btn btn-success" onclick="alert('Nanti kita buat fitur ini!')">+ Tambah Kost Baru</button>
        </div>
        <div class="card shadow-sm border-0">
            <table class="table table-hover mb-0">
                <thead class="thead-dark">
                    <tr><th>ID</th><th>Nama Kost</th><th>Harga</th><th>Aksi</th></tr>
                </thead>
                <tbody id="tableKost"></tbody>
            </table>
        </div>
    </div>

    <div id="bookingSection" style="display: none;">
        <h3 class="mb-4">📅 Data Pesanan Masuk</h3>
        <div class="card shadow-sm border-0">
            <table class="table table-hover mb-0">
                <thead class="bg-primary text-white">
                    <tr>
                        <th>ID</th>
                        <th>Penyewa</th>
                        <th>Kost Dipilih</th>
                        <th>Durasi</th>
                        <th>Total Bayar</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="tableBooking"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 1. Cek Login Admin
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user || user.role !== 'ADMIN') {
        alert("Akses Ditolak!");
        window.location.href = 'login.html';
    }

    // 2. Load Data Kost
    async function loadKosts() {
        const res = await fetch('/api/kosts');
        const data = await res.json();
        let html = '';
        data.forEach(k => {
            html += `<tr>
                <td>${k.id}</td>
                <td><b>${k.name}</b></td>
                <td>Rp ${k.price.toLocaleString()}</td>
                <td><button class="btn btn-sm btn-primary">Edit</button> <button class="btn btn-sm btn-danger">Hapus</button></td>
            </tr>`;
        });
        document.getElementById('tableKost').innerHTML = html;
    }

    // 3. Load Data Booking (BARU)
    async function loadBookings() {
        const res = await fetch('/api/bookings');
        const data = await res.json();
        let html = '';
        data.forEach(b => {
            html += `<tr>
                <td>#${b.id}</td>
                <td>
                    <b>${b.customerName}</b><br>
                    <small class="text-muted">${b.customerEmail}</small>
                </td>
                <td>${b.kostName}</td>
                <td>${b.durationInMonths} Bulan</td>
                <td class="text-success font-weight-bold">Rp ${b.totalPrice.toLocaleString()}</td>
                <td><span class="badge badge-success">${b.status}</span></td>
            </tr>`;
        });
        document.getElementById('tableBooking').innerHTML = html;
    }

    // Navigasi Tab
    function switchTab(tab) {
        document.querySelectorAll('.sidebar a').forEach(el => el.classList.remove('active'));
        if(tab === 'kost') {
            document.getElementById('kostSection').style.display = 'block';
            document.getElementById('bookingSection').style.display = 'none';
            event.target.classList.add('active');
        } else {
            document.getElementById('kostSection').style.display = 'none';
            document.getElementById('bookingSection').style.display = 'block';
            event.target.classList.add('active');
            loadBookings(); // Load data saat tab dibuka
        }
    }

    function logout() {
        localStorage.removeItem('user');
        window.location.href = 'login.html';
    }

    loadKosts(); // Load awal
</script>

</body>
</html>
