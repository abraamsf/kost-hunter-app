<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kost Hunter - Cari Hunian Nyaman</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700">
    <link rel="stylesheet" href="font-awesome-4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="slick/slick.css"/>
    <link rel="stylesheet" type="text/css" href="slick/slick-theme.css"/>
    <link rel="stylesheet" href="css/tooplate-style.css">

    <style>
        /* === FIX TINGGI KARTU (VERSI KUAT) === */
        
        /* 1. Paksa track slider jadi Flexbox agar semua anak tingginya sama */
        .slick-track {
            display: flex !important;
            align-items: stretch; /* Paksa memanjang ke bawah */
        }

        /* 2. Slide individu mengikuti tinggi track */
        .slick-slide {
            height: auto !important; 
            display: flex !important; 
            float: none !important; 
        }

        /* 3. Kartu Putih (Container) */
        .tm-carousel-item {
            display: flex !important;       /* Wajib Flex */
            flex-direction: column;         /* Susun ke bawah */
            height: 100% !important;        /* Tinggi mentok */
            width: 100%;
            margin: 0 10px;                 /* Jarak antar kartu (Gutter) */
            border-radius: 8px;
            overflow: hidden;
            background-color: #fff;         /* Pastikan putih */
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        /* 4. Area Teks (Padding dalam kartu) */
        .tm-article-pad {
            flex: 1 1 auto;                 /* Tumbuh mengisi ruang kosong */
            display: flex !important;
            flex-direction: column;
            padding: 20px;
            justify-content: space-between; /* Dorong konten ke atas & bawah */
        }

        /* 5. Judul & Harga (Bagian Atas) */
        .tm-article-pad header, 
        .tm-article-pad .tm-color-primary {
            flex-shrink: 0; /* Jangan menyusut */
        }

        /* 6. Deskripsi (Bagian Tengah) */
        .tm-article-pad p:nth-of-type(2) {
            flex-grow: 1; /* Ambil sisa ruang */
            margin-bottom: 20px;
            /* Potong teks jika kepanjangan (maks 3 baris) */
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 7. Tombol Lihat Detail (Bagian Bawah) */
        .tm-btn-primary {
            margin-top: auto !important; /* Dorong ke paling bawah */
            width: 100%;
            text-align: center;
            border-radius: 4px;
            display: block; /* Pastikan tombol block */
        }
        
        /* === BACKGROUND & LAINNYA === */
        #tm-section-1 {
            background-image: url('https://images.unsplash.com/photo-1560518883-ce09059eeffa?q=80&w=1920') !important;
            background-size: cover; background-position: center;
            box-shadow: inset 0 0 0 2000px rgba(0, 0, 0, 0.3); 
        }

        .search-container { position: relative; }
        #resetBtn { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #999; font-size: 1.2rem; display: none; z-index: 10; }
        #resetBtn:hover { color: #dc3545; }
        #searchInput { padding-right: 45px !important; }

        .nav-link-btn { padding: 25px 20px !important; margin: 0 !important; border-radius: 0 !important; font-weight: 600 !important; text-transform: uppercase; }
        .btn-logout { background-color: #dc3545 !important; color: white !important; border: none !important; }
        .btn-login { background-color: #007bff !important; color: white !important; border: none !important; }
        @media (max-width: 991px) { .nav-link-btn { padding: 15px !important; width: 100%; text-align: center; } }
    </style>
</head>

<body>
    <div class="tm-main-content" id="top">
        <div class="tm-top-bar-bg"></div>
        <div class="tm-top-bar" id="tm-top-bar">
            <div class="container">
                <div class="row">
                    <nav class="navbar navbar-expand-lg narbar-light">
                        <a class="navbar-brand mr-auto" href="#">
                            <img src="img/logo.png" alt="Logo"> Kost Hunter
                        </a>
                        <button type="button" id="nav-toggle" class="navbar-toggler collapsed" data-toggle="collapse" data-target="#mainNav" aria-expanded="false" aria-label="Toggle navigation">
                            <span class="navbar-toggler-icon"></span>
                        </button>
                        <div id="mainNav" class="collapse navbar-collapse tm-bg-white">
                            <ul class="navbar-nav ml-auto align-items-center">
                                <li class="nav-item"><a class="nav-link" href="#top">Home</a></li>
                                <li class="nav-item"><a class="nav-link" href="#tm-section-4">Daftar Kost</a></li>
                                <li class="nav-item" id="authBtnItem">
                                    <a class="nav-link nav-link-btn btn-login" href="login.html">LOGIN</a>
                                </li>
                            </ul>
                        </div>                            
                    </nav>            
                </div>
            </div>
        </div>

        <div class="tm-section tm-bg-img" id="tm-section-1">
            <div class="tm-bg-white ie-container-width-fix-2">
                <div class="container ie-h-align-center-fix">
                    <div class="row">
                        <div class="col-xs-12 ml-auto mr-auto ie-container-width-fix">
                            <div class="tm-search-form tm-section-pad-2">
                                <h2 class="text-center mb-4" style="color: #666;">Cari Kost Impian Anda</h2>
                                <div class="form-row tm-search-form-row justify-content-center">
                                    <div class="form-group tm-form-element tm-form-element-100 search-container">
                                        <i class="fa fa-map-marker fa-2x tm-form-element-icon"></i>
                                        <input name="city" type="text" class="form-control" id="searchInput" placeholder="Ketik lokasi (misal: Dago)...">
                                        <i class="fa fa-times-circle" id="resetBtn" title="Hapus"></i>
                                    </div>
                                    <div class="form-group tm-form-element tm-form-element-2">
                                        <button type="button" class="btn btn-primary tm-btn-search" id="searchBtn">Cari</button>
                                    </div>
                                </div>
                            </div>
                        </div>                        
                    </div>      
                </div>
            </div>                  
        </div>
        
        <div class="tm-section tm-section-pad tm-bg-gray" id="tm-section-4">
            <div class="container">
                <div class="row">
                    <div class="col-sm-12">
                        <h2 class="tm-section-title text-center" style="color: #333 !important;">Rekomendasi Kost Terbaru</h2>
                        
                        <div class="tm-article-carousel" id="kost-container">
                            <div class="text-center p-5">Sedang memuat data...</div>
                        </div>    
                    </div>
                </div>
            </div>
        </div>
        
        <footer class="tm-bg-dark-blue">
            <div class="container">
                <div class="row">
                    <p class="col-sm-12 text-center tm-font-light tm-color-white p-4 tm-margin-b-0">Copyright © 2025 Kost Hunter</p>        
                </div>
            </div>                
        </footer>
    </div>
    
    <script src="js/jquery-1.11.3.min.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="slick/slick.min.js"></script>
    
    <script>
        const PLACEHOLDER_IMG = "https://picsum.photos/400/300?grayscale"; 

        async function loadKosts(keyword = '') {
            try {
                let url = '/api/kosts';
                if (keyword) url += `?keyword=${keyword}`;

                const response = await fetch(url);
                const kosts = await response.json();
                const container = $('#kost-container');
                
                if (container.hasClass('slick-initialized')) container.slick('unslick');
                container.empty();

                if (kosts.length === 0) {
                    container.html('<div class="text-center p-5"><h5>Tidak ada kost yang ditemukan :(</h5></div>');
                    return;
                }

                kosts.forEach(kost => {
                    let imgSrc = kost.imageUrl && kost.imageUrl.startsWith('http') ? kost.imageUrl : PLACEHOLDER_IMG;

                    // Hapus class 'mr-2' di sini karena sudah dihandle CSS margin
                    const htmlItem = `
                        <article class="tm-bg-white tm-carousel-item">
                            <img src="${imgSrc}" alt="Image" class="img-fluid" style="height: 200px; width: 100%; object-fit: cover;" onerror="this.src='${PLACEHOLDER_IMG}'">
                            <div class="tm-article-pad">
                                <div>
                                    <header><h3 class="text-uppercase tm-article-title-2">${kost.name}</h3></header>
                                    <p class="tm-color-primary font-weight-bold" style="font-size: 1.2rem">Rp ${kost.price.toLocaleString('id-ID')}</p>
                                </div>
                                <p>${kost.description}</p>
                                <a href="detail.html?id=${kost.id}" class="text-uppercase btn-primary tm-btn-primary">Lihat Detail</a>
                            </div>                                
                        </article>
                    `;
                    container.append(htmlItem);
                });

                $('.tm-article-carousel').slick({
                    infinite: true, 
                    dots: true, 
                    slidesToShow: 3, 
                    slidesToScroll: 1, 
                    autoplay: true, 
                    autoplaySpeed: 3000,
                    arrows: true,
                    responsive: [{ breakpoint: 992, settings: { slidesToShow: 2 } }, { breakpoint: 576, settings: { slidesToShow: 1 } }]
                });

            } catch (error) {
                console.error("Gagal load kost:", error);
                $('#kost-container').html('<p class="text-center text-danger">Gagal memuat data kost.</p>');
            }
        }

        function doLogout() {
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        $(document).ready(function(){
            const currentUser = JSON.parse(localStorage.getItem('user'));
            if (currentUser) {
                document.getElementById('authBtnItem').innerHTML = `
                    <a class="nav-link nav-link-btn btn-logout" href="#" onclick="doLogout()">
                        LOGOUT (${currentUser.name.split(' ')[0]})
                    </a>
                `;
            }

            loadKosts();

            $('#searchInput').on('input', function() {
                $(this).val().length > 0 ? $('#resetBtn').fadeIn() : $('#resetBtn').fadeOut();
            });
            $('#resetBtn').click(function() {
                $('#searchInput').val(''); $(this).fadeOut(); loadKosts();
            });
            $('#searchBtn').click(() => loadKosts($('#searchInput').val()));
            $('#searchInput').keypress((e) => { if(e.which == 13) loadKosts($('#searchInput').val()); });
        });
    </script>
</body>
</html>
